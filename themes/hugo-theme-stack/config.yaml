baseurl: https://zouyingjie.github.io
languageCode: en-us
title: 寻雾启示
description: 'abcd'
favicon: https://pub-08b57ed9c8ce4fadab4077a9d577e857.r2.dev/wechat_head_icon.png
defaultContentLanguage: en
hasCJKLanguage: false
disqusShortname: hugo-theme-stack
pagination:
  pagerSize: 10

goldmark:
  renderer:
    unsafe: true
  extensions:
    passthrough:
      enable: true
      delimiters:
        block:
          - - \[
            - \]
          - - $$
            - $$
        inline:
          - - \(
            - \)
tableOfContents:
  endLevel: 4
  ordered: true
  startLevel: 2
highlight:
  noClasses: false
  codeFences: true
  guessSyntax: true
  lineNoStart: 1
  lineNos: true
  lineNumbersInTable: true
  tabWidth: 4


social:
  - identifier: twitter
    name: Twitter
    url: https://x.com/BoyYingjiezou1
    params:
      icon: brand-twitter

imports:
  - path: github.com/CaiJimmy/hugo-theme-stack/v3

mainSections:
  - post
rssFullContent: true
favicon: /avatar.png
dateFormat:
  published: Jan 02, 2006
  lastUpdated: Jan 02, 2006 15:04 MST


widgets:
  homepage:
    - type: search
    - type: archives
      params:
        limit: 5
    - type: categories
      params:
        limit: 20
    - type: tag-cloud
      params:
        limit: 20
  page:
    - type: toc
opengraph:
  twitter:
    site: ""
    card: summary_large_image
defaultImage:
  opengraph:
    enabled: false
    local: false
    src: ""
colorScheme:
  toggle: true
  default: auto
imageProcessing:
  cover:
    enabled: true
  content:
    enabled: true
comments:
  enabled: true
  provider: disqus
  disqusjs:
    shortname: ""
    apiUrl: ""
    apiKey: ""
    admin: ""
    adminLabel: ""
  utterances:
    repo: ""
    issueTerm: pathname
    label: ""
  remark42:
    host: ""
    site: ""
    locale: ""
  vssue:
    platform: ""
    owner: ""
    repo: ""
    clientId: ""
    clientSecret: ""
    autoCreateIssue: false
  waline:
    serverURL: ""
    lang: ""
    visitor: ""
    avatar: ""
    emoji:
      - https://cdn.jsdelivr.net/gh/walinejs/emojis/weibo
    requiredMeta:
      - name
      - email
      - url
    placeholder: ""
    locale:
      admin: Admin
  twikoo:
    envId: ""
    region: ""
    path: ""
    lang: ""
