post: /p/:slug/
page: /:slug/


includeNewer: true
threshold: 60
toLower: false
indices:
  - name: tags
    weight: 100
  - name: categories
    weight: 200


module:
    hugoVersion:
        extended: true
        min: "0.87.0"

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon:

    footer:
        since: 2020
        customText: ""
    dateFormat:
        published: Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:
        compact: false
        emoji: 😈
        subtitle: So you have to trust that the dots will somehow connect in your future
        avatar:
            enabled: true
            local: true
            src: img/avatar.png

    article:
        headingAnchor: false
        math: true
        toc: true
        readingTime: true

        license:
            enabled: false
            default: Licensed under CC BY-NC-SA 4.0

    comments:
        enabled: false
        provider: disqus

        disqusjs:
            shortname:
            apiUrl:
