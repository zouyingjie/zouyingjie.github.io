            - type: search
            - type: archives
              params:
                limit: 5
            - type: categories
              params:
                limit: 20
            - type: tag-cloud
              params:
                limit: 20   
        page:
            - type: toc

    opengraph:
        twitter:
            # Your Twitter username
            site:

            # Available values: summary, summary_large_image
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        # Display toggle
        toggle: true

        # Available values: auto, light, dark
        default: auto

    imageProcessing:
