baseURL: "http://localhost:1313/"
languageCode: "zh-cn"
defaultContentLanguage: "zh"
title: "寻雾启示"
theme: "PaperMod"
hasCJKLanguage: true
enableEmoji: true
enableRobotsTXT: true

pagination:
  pagerSize: 7

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - name: "归档"
      url: "/archives/"
      weight: 10
    - name: "分类"
      url: "/categories/"
      weight: 20
    - name: "标签"
      url: "/tags/"
      weight: 30
    - name: "搜索"
      url: "/search/"
      weight: 40
    - name: "关于"
      url: "/about/"
      weight: 50
    - name: "云原生"
      url: "https://architecture-notes.tech/"
      weight: 60

params:
  env: "production"
  author: "寻雾"
  description: "记录软件工程、分布式系统、云原生与 AI 的学习、实践与思考。"
  keywords:
    - "软件工程"
    - "分布式系统"
    - "云原生"
    - "AI"
  mainSections:
    - posts

  defaultTheme: "light"
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false
  comments: true
  DateFormat: "2006-01-02"

  homeInfoParams:
    Title: "👋 你好，我是寻雾"
    Content: "记录软件工程、分布式系统、云原生与 AI 的学习、实践与思考。"

  socialIcons:
    - name: "github"
      url: "https://github.com/zouyingjie"
    - name: "x"
      url: "https://x.com/BoyYingjiezou1"
    - name: "rss"
      url: "/index.xml"

  assets:
    favicon: "/favicon.ico"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content

taxonomies:
  category: "categories"
  tag: "tags"
  series: "series"

sitemap:
  changefreq: "weekly"
  filename: "sitemap.xml"
  priority: 0.5

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4
