baseURL = 'https://zouyingjie.github.io'
languageCode = 'en-us'
title = '寻雾启示'
description = 'abcd'

theme = 'hugo-theme-stack'

# Theme i18n support
# Available values: en, fr, id, ja, ko, pt-br, zh-cn, zh-tw, es, de, nl, it, th, el, uk, ar
defaultContentLanguage = "en"

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage = false

# Change it to your Disqus shortname before using
disqusShortname = "hugo-theme-stack"

[pagination]
pagerSize = 10


[params]
mainSections = [ "post" ]
featuredImageField = "image"
rssFullContent = true
 customCSS = ["css/custom.css"]

[[params.social]]
identifier = "twitter"
name = "Twitter"
url = "https://x.com/BoyYingjiezou1"

[params.social.params]
icon = "brand-twitter"

  [params.footer]
  since = 2_020
  customText = ""

  [params.dateFormat]
  published = "Jan 02, 2006"
  lastUpdated = "Jan 02, 2006 15:04 MST"

  [params.sidebar]
  compact = false
  emoji = "😈"
  subtitle = "So you have to trust that the dots will somehow connect in your future"

    [params.sidebar.avatar]
    enabled = true
    local = true
    src = "img/avatar.png"

  [params.article]
  headingAnchor = false
  math = true
  toc = true
  readingTime = true

    [params.article.license]
    enabled = false
    default = "Licensed under CC BY-NC-SA 4.0"

  [params.comments]
  enabled = true
  provider = "giscus"
  [params.comments.giscus]
    reactionsEnabled = 1
    emitMetadata = 0
    enable = true
    repo = "zouyingjie/zouyingjie.github.io"
    repoId = "R_kgDONIBCAw"
    category = "Announcements"
    categoryId = "DIC_kwDONIBCA84Cj2UX"
    mapping = "pathname"
    data-input-position="bottom"
    data-lang="zh-CN"
    data-theme="preferred_color_scheme"


[[params.widgets.homepage]]
type = "search"

[[params.widgets.homepage]]
type = "archives"

  [params.widgets.homepage.params]
  limit = 5

[[params.widgets.homepage]]
type = "categories"

  [params.widgets.homepage.params]
  limit = 20

[[params.widgets.homepage]]
type = "tag-cloud"

  [params.widgets.homepage.params]
  limit = 20

[[params.widgets.page]]
type = "toc"

[params.opengraph.twitter]
card = "summary_large_image"

[params.defaultImage.opengraph]
enabled = false
local = false

  [params.colorScheme]
  toggle = true
  default = "auto"

[params.imageProcessing.cover]
enabled = true

[params.imageProcessing.content]
enabled = true
